spring.application.name=articulo-api

# --- Conexion a la base de datos (MariaDB/MySQL) ---
# Valores por defecto de XAMPP: usuario root, sin contrasena, puerto 3306.
# createDatabaseIfNotExist=true crea la base "articulo_db" automaticamente si no existe.
spring.datasource.url=jdbc:mariadb://localhost:3306/articulos_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- JPA / Hibernate ---
# update: crea/actualiza las tablas automaticamente a partir de las entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
